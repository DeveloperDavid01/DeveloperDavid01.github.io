<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Certificados - Platzi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Estilos interactivos para las tarjetas minimalistas */
        .interactive-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .interactive-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        /* Ajuste de badges dinámicos */
        .badge-Básico { background-color: #28a745; color: white; }
        .badge-Avanzado { background-color: #dc3545; color: white; }
        .badge-Intermedio { background-color: #fd7e14; color: white; }
        
        /* Modal estilizado con estética de cristal */
        .glass-modal {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
        }
        .glass-modal .modal-header, .glass-modal .modal-footer {
            border: none;
        }
        .modal-cert-img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 1.5px;
        }
    </style>
</head>
<body>

    <div class="container py-4">
        <div class="mb-4">
            <a href="../index.html" class="btn btn-outline-light btn-sm">Volver al Inicio</a>
        </div>

        <section class="glass-section">
            <h1 class="h4 font-weight-bold mb-4 text-center border-bottom pb-2" style="position: static; color: #fff;">
                Mis Certificados en Platzi
            </h1>
            
            <div class="row" id="contenedor-certificados"></div>
        </section>
    </div>

    <div class="modal fade" id="certificadoModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
            <div class="modal-content glass-modal">
                <div class="modal-header">
                    <h5 class="modal-title font-weight-bold" id="modalTitulo"></h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="row align-items-center">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <img src="" id="modalImagen" alt="Certificado" class="modal-cert-img">
                        </div>
                        <div class="col-md-6">
                            <span class="badge mb-3" id="modalBadge"></span>
                            <div class="small text-white-50 mb-3" id="modalDetalles"></div>
                            <p class="text-light" id="modalDescripcion" style="font-size: 0.95rem; line-height: 1.5;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const certificados = [
            {
                titulo: "Curso para Aprender en Línea Efectivamente",
                nivel: "Básico",
                clases: 11,
                horasContenido: 2,
                horasPractica: 6,
                descripcion: "Mejora tus habilidades de estudio en línea. Identifica y rompe mitos del aprendizaje, crea métodos efectivos, organiza tu tiempo y mejora la retención de información con prácticas como la memorización y el uso ético de la IA. Aplicable a cualquier área.",
                imagen: "../assets/img/certificados/aprender-enlinea-efectivamente.jpg"
            },
            {
                titulo: "Curso de Gestión Efectiva del Tiempo",
                nivel: "Básico",
                clases: 16,
                horasContenido: 1,
                horasPractica: 8,
                descripcion: "Aprende a priorizar tareas, vencer la procrastinación y usa la IA para planificar proyectos en minutos. Crea hábitos sólidos, define metas SMART y organiza tu flujo de trabajo con Bullet Journal. Descubre cómo integrar la IA como asistente digital y transforma tus tareas en progreso real.",
                imagen: "../assets/img/certificados/gestion-tiempo.jpg"
            },
            {
                titulo: "Curso Básico de PHP: Instalación, Fundamentos y Operadores",
                nivel: "Básico", 
                clases: 23,
                horasContenido: 4,
                horasPractica: 14,
                descripcion: "Instala PHP y convierte segundos en horas, minutos y segundos. Entiende la sintaxis, variables y constantes de PHP. Aprende operadores lógicos, aritméticos y relacionales. Realiza cálculos matemáticos y utilízalos en tu código PHP.",
                imagen: "../assets/img/certificados/fundamentos-operadores-php.jpg"
            },
            {
                titulo: "Curso de Git y GitHub",
                nivel: "Básico", 
                clases: 42,
                horasContenido: 6,
                horasPractica: 18,
                descripcion: "Gestiona versiones, colabora en equipo y publica proyectos usando Git y GitHub. Controla ramas, pull requests, releases, seguridad y automatizaciones con herramientas clave de la industria.",
                imagen: "../assets/img/certificados/git-github.jpg"
            },
            {
                titulo: "Curso de PHP: Arreglos, Funciones y Estructuras de Control",
                nivel: "Básico", 
                clases: 25,
                horasContenido: 4,
                horasPractica: 16,
                descripcion: "Explora PHP creando un juego del ahorcado. Descubre cómo trabajar con arreglos, condicionales y ciclos para controlar el flujo del juego. Implementa funciones y plantillas para gestionar el código de forma eficiente.",
                imagen: "../assets/img/certificados/arreglos-funciones-estructurascontrol.jpg"
            },
            {
                titulo: "Curso de Fundamentos de PHP",
                nivel: "Básico", 
                clases: 23,
                horasContenido: 2,
                horasPractica: 6,
                descripcion: "Aprende a desarrollar aplicaciones web dinámicas con PHP. Desde la instalación del entorno hasta la creación de formularios y gestión de sesiones, construirás una app de registro y login aplicando buenas prácticas. Dominarás la sintaxis básica, el uso de variables, arreglos, funciones y la integración con HTML. Este curso te prepara para avanzar hacia la programación orientada a objetos, bases de datos y APIs.",
                imagen: "../assets/img/certificados/fundamentos-php.jpg"
            },
            {
                titulo: "Curso de PHP con Composer",
                nivel: "Básico",
                clases: 19,
                horasContenido: 2,
                horasPractica: 4,
                descripcion: "Desarrolla aplicaciones web profesionales en PHP utilizando Composer para gestionar dependencias y automatizar cargas. Aprende a crear estructuras de código eficiente y mantén tus proyectos organizados y modulares.",
                imagen: "../assets/img/certificados/php-composer.jpg"
            },
            {
                titulo: "Curso de PHP con Laravel",
                nivel: "Básico", 
                clases: 25,
                horasContenido: 3,
                horasPractica: 16,
                descripcion: "¡Con Platzi, desarrollar aplicaciones web a la medida de tus necesidades es pan comido! Aprovecha todas las bondades de Laravel. Descubre con este framework PHP las ventajas de tener una increíble comunidad de apoyo y sé el mejor artesano de desarrollo que ha pisado la tierra.",
                imagen: "../assets/img/certificados/php-laravel.jpg"
            },
            {
                titulo: "Curso de Introducción a Laravel 6",
                nivel: "Básico", 
                clases: 37,
                horasContenido: 5,
                horasPractica: 10,
                descripcion: "Crea un blog desde cero con Laravel usando TDD. Aprende a gestionar contenido, validar datos, y proteger tu API con autenticación de token. Configura rutas, controladores y vistas utilizando el sistema de plantillas Blade.",
                imagen: "../assets/img/certificados/introduccion-laravel.jpg"
            },
            {
                titulo: "Curso de API REST con Laravel",
                nivel: "Avanzado",
                clases: 18,
                horasContenido: 2,
                horasPractica: 8,
                descripcion: "Construye APIs REST profesionales con Laravel, aprendiendo desde la estructura básica y planificación hasta la autenticación con tokens en APIs privadas. Configura y personaliza recursos, colecciones y maneja versiones eficientemente.",
                imagen: "../assets/img/certificados/apirest-laravel.jpg"
            }
        ];

        // 2. Método optimizado: Renderiza las tarjetas sin la imagen ni la descripción pesada
        function crearTarjetaCertificado(cert, index) {
            return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="custom-card interactive-card" onclick="abrirDetalleCertificado(${index})">
                        <div class="p-3">
                            <h2 class="h5 font-weight-bold mb-1" style="min-height: 48px; display: flex; align-items: center;">${cert.titulo}</h2>
                            <span class="badge badge-${cert.nivel} mb-3">Nivel: ${cert.nivel}</span>
                            
                            <div class="small text-white-50 mb-0">
                                <div class="mb-1"> <strong>Clases:</strong> ${cert.clases} clases</div>
                                <div class="mb-1"> <strong>Horas de contenido:</strong> ${cert.horasContenido}h de video</div>
                                <div> <strong>Horas de práctica:</strong> ${cert.horasPractica}h estimadas</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 3. Método interactivo: Captura los datos completos del objeto seleccionado e inyecta la información al Modal
        function abrirDetalleCertificado(index) {
            const cert = certificados[index];
            
            document.getElementById('modalTitulo').innerText = cert.titulo;
            document.getElementById('modalImagen').src = cert.imagen;
            document.getElementById('modalImagen').alt = `Certificado de ${cert.titulo}`;
            document.getElementById('modalDescripcion').innerText = cert.descripcion;
            
            const badge = document.getElementById('modalBadge');
            badge.className = `badge badge-${cert.nivel}`;
            badge.innerText = `Nivel: ${cert.nivel}`;
            
            document.getElementById('modalDetalles').innerHTML = `
                <div> <strong>Clases:</strong> ${cert.clases} clases</div>
                <div> <strong>Horas de contenido:</strong> ${cert.horasContenido}h de video</div>
                <div> <strong>Horas de práctica:</strong> ${cert.horasPractica}h estimadas</div>
            `;
            
            // Activar el modal usando el script nativo de Bootstrap
            $('#certificadoModal').modal('show');
        }

        // 4. Inyección inicial en el HTML
        const contenedor = document.getElementById('contenedor-certificados');
        contenedor.innerHTML = certificados.map((c, index) => crearTarjetaCertificado(c, index)).join('');
    </script>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
